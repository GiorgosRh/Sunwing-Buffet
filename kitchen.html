<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager · Helios & Ella</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#060604"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink:#060604; --ink2:#0e0d09; --ink3:#161410;
      --gold:#b8962e; --gold2:#d4af55;
      --smoke:#2a2520; --ash:#4a4438; --fog:#8a7e6e;
      --paper:#f5f0e8;
      --high:#ef4444; --med:#f59e0b; --low:#22c55e;
    }
    body.light {
      --ink:#faf8f4; --ink2:#f0ebe0; --ink3:#e8e2d5;
      --gold:#7a5c16; --gold2:#9a7820; --gold3:#b89030;
      --smoke:#d5ccc0; --ash:#5a5040; --fog:#7a6e5e;
      --paper:#1a1510; --paper2:#2a2015;
      --high:#c01818; --med:#b07000; --low:#148014;
    }
    body.light .topbar{background:rgba(250,248,244,.97)!important;border-bottom-color:#d5ccc0!important;}
    body.light .grain{display:none;}
    .theme-toggle-btn{background:none;border:1px solid var(--smoke);color:var(--ash);padding:4px 9px;cursor:pointer;font-size:15px;line-height:1;transition:all .15s;font-family:inherit;}
    .theme-toggle-btn:hover{border-color:var(--gold);color:var(--gold2);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--ink);color:var(--paper);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;}
    a{color:var(--gold2);text-decoration:none;}

    .topbar{position:sticky;top:0;z-index:100;background:rgba(6,6,4,.97);backdrop-filter:blur(20px);border-bottom:1px solid #ffffff08;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;}
    .topbar-left{display:flex;align-items:center;gap:14px;}
    .topbar-brand{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold2);}
    .topbar-div{width:1px;height:18px;background:var(--smoke);}
    .topbar-title{font-size:10px;letter-spacing:3px;color:var(--ash);text-transform:uppercase;}
    .topbar-back{font-size:11px;color:var(--ash);letter-spacing:2px;}
    .topbar-back:hover{color:var(--gold2);}

    .page{max-width:680px;margin:0 auto;padding:20px 16px 60px;}

    /* SERVICE TOGGLE */
    .svc-row{display:flex;gap:8px;margin-bottom:16px;}
    .svc-btn{flex:1;padding:10px;border:1px solid var(--smoke);background:var(--ink2);color:var(--ash);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .15s;}
    .svc-btn.active{border-color:var(--gold);color:var(--gold);background:#1a1608;}

    /* DAY GRID */
    .day-label{font-size:8px;letter-spacing:4px;color:var(--ash);text-transform:uppercase;margin-bottom:8px;}
    .day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px;}
    .day-btn{padding:8px 2px;border:1px solid var(--smoke);background:var(--ink2);color:var(--ash);font-family:'DM Sans',sans-serif;font-size:9px;cursor:pointer;text-align:center;transition:all .15s;}
    .day-btn.active{border-color:var(--gold);color:var(--gold);background:#1a1608;}
    .day-flag{font-size:14px;margin-bottom:3px;}
    .day-theme-bar{padding:8px 12px;background:var(--ink2);border:1px solid var(--smoke);border-left:2px solid var(--gold);font-size:11px;color:var(--fog);margin-bottom:16px;}
    .day-theme-bar strong{color:var(--gold2);}

    /* STATION */
    .station-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:20px;}
    .st-btn{padding:10px 4px;border:1px solid var(--smoke);background:var(--ink2);color:var(--ash);font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;text-align:center;transition:all .15s;}
    .st-btn.active{border-color:var(--gold);color:var(--gold);background:#1a1608;}
    .st-icon{font-size:16px;margin-bottom:3px;}

    /* PROGRESS */
    .progress-wrap{margin-bottom:24px;}
    .progress-top{display:flex;justify-content:space-between;font-size:10px;color:var(--ash);margin-bottom:5px;letter-spacing:1px;}
    .progress-bar{height:3px;background:var(--smoke);}
    .progress-fill{height:100%;background:var(--gold);transition:width .4s;}
    .progress-fill.done{background:var(--low);}

    /* SECTIONS */
    .section-block{margin-bottom:22px;}
    .section-hdr{border-bottom:1px solid var(--smoke);padding-bottom:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-end;}
    .section-time{font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:2px;}
    .section-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--paper);}
    .section-count{font-size:9px;color:var(--ash);}

    /* TASKS */
    .task{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;margin-bottom:5px;background:var(--ink2);border:1px solid var(--smoke);cursor:pointer;transition:all .15s;}
    .task.done{opacity:.5;background:var(--ink3);}
    .task:hover{border-color:var(--ash);}
    .task-check{width:18px;height:18px;border:1px solid var(--ash);background:transparent;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--low);transition:all .15s;}
    .task.done .task-check{background:var(--low);border-color:var(--low);color:#000;}
    .task-body{flex:1;}
    .task-text{font-size:12px;color:var(--paper);line-height:1.5;}
    .task.done .task-text{text-decoration:line-through;color:var(--ash);}
    .task-meta{font-size:9px;color:var(--ash);margin-top:3px;letter-spacing:1px;}
    .task-pri{font-size:8px;letter-spacing:1px;padding:2px 6px;border:1px solid;flex-shrink:0;margin-top:2px;}
    .task-pri.high{color:var(--high);border-color:var(--high);}
    .task-pri.med{color:var(--med);border-color:var(--med);}
    .task-pri.low{color:var(--low);border-color:var(--low);}

    /* COMPLETE BANNER */
    .complete-banner{padding:16px;background:#0a1a0a;border:1px solid var(--low);text-align:center;margin-top:12px;display:none;}
    .complete-banner.show{display:block;}
    .complete-icon{font-size:22px;margin-bottom:6px;}
    .complete-text{font-size:11px;letter-spacing:3px;color:var(--low);}

    /* RESET */
    .reset-btn{width:100%;padding:10px;border:1px solid var(--smoke);background:transparent;color:var(--ash);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;margin-top:10px;transition:all .15s;}
    .reset-btn:hover{border-color:var(--ash);color:var(--paper);}
    .pin-btn{width:100%;padding:8px;border:none;background:transparent;color:var(--ash);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:1px;cursor:pointer;margin-top:6px;transition:color .15s;opacity:.6;}
    .pin-btn:hover{color:var(--gold);opacity:1;}

    .no-tasks{text-align:center;padding:32px;color:var(--ash);font-size:12px;}

    /* SHIFT ASSIGNMENT PANEL */
    .shift-add-toggle{width:100%;padding:10px;border:1px dashed var(--ash);background:transparent;color:var(--ash);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;margin-bottom:12px;transition:all .15s;}
    .shift-add-toggle:hover,.shift-add-toggle.open{border-color:var(--gold);color:var(--gold);}
    .shift-form{background:var(--ink3);border:1px solid var(--smoke);padding:14px;margin-bottom:16px;}
    .sf-row{margin-bottom:8px;}
    .sf-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .sf-input,.sf-select{width:100%;padding:10px 12px;background:var(--ink2);border:1px solid var(--smoke);color:var(--paper);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;}
    .sf-input::placeholder{color:var(--ash);}
    .sf-input:focus,.sf-select:focus{border-color:var(--gold);}
    .sf-select{-webkit-appearance:none;appearance:none;cursor:pointer;}
    .sf-select option{background:var(--ink2);}
    .sf-submit{width:100%;padding:10px;background:var(--gold);border:none;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:500;transition:background .15s;margin-top:4px;}
    .sf-submit:hover{background:var(--gold2);}
    .shift-group{margin-bottom:22px;}
    .shift-group-hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--smoke);padding-bottom:8px;margin-bottom:10px;}
    .shift-group-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--paper);}
    .shift-group-name.unassigned{color:var(--fog);font-style:italic;}
    .shift-group-count{font-size:9px;color:var(--ash);}
    .shift-task{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;margin-bottom:5px;background:var(--ink2);border:1px solid var(--smoke);transition:all .15s;}
    .shift-task.done{opacity:.5;background:var(--ink3);}
    .shift-task-check{width:18px;height:18px;border:1px solid var(--ash);background:transparent;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--low);cursor:pointer;transition:all .15s;}
    .shift-task.done .shift-task-check{background:var(--low);border-color:var(--low);color:#000;}
    .shift-task-body{flex:1;cursor:pointer;}
    .shift-task-text{font-size:12px;color:var(--paper);line-height:1.5;}
    .shift-task.done .shift-task-text{text-decoration:line-through;color:var(--ash);}
    .shift-task-meta{font-size:9px;color:var(--ash);margin-top:3px;letter-spacing:1px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .shift-del{background:none;border:none;color:var(--ash);font-size:16px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1;transition:color .15s;}
    .shift-del:hover{color:var(--high);}
    .shift-empty{text-align:center;padding:32px;color:var(--ash);font-size:12px;line-height:1.8;}

    /* ADMIN MODAL */
    .admin-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(6,6,4,.85);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
    .admin-modal{background:var(--ink2);border:1px solid var(--gold);max-width:320px;width:100%;padding:28px 24px;}
    .admin-modal-icon{font-size:24px;text-align:center;margin-bottom:12px;}
    .admin-modal-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold2);text-align:center;margin-bottom:6px;letter-spacing:1px;}
    .admin-modal-sub{font-size:11px;color:var(--fog);text-align:center;margin-bottom:20px;line-height:1.6;}
    .admin-pin-input{width:100%;padding:12px;background:var(--ink);border:1px solid var(--smoke);color:var(--paper);font-family:'DM Sans',sans-serif;font-size:18px;letter-spacing:6px;text-align:center;outline:none;margin-bottom:8px;}
    .admin-pin-input:focus{border-color:var(--gold);}
    .admin-error{font-size:11px;color:var(--high);text-align:center;min-height:18px;margin-bottom:12px;letter-spacing:1px;}
    .admin-modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .admin-btn-cancel{padding:10px;border:1px solid var(--smoke);background:transparent;color:var(--ash);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .15s;}
    .admin-btn-cancel:hover{border-color:var(--ash);color:var(--paper);}
    .admin-btn-confirm{padding:10px;border:none;background:var(--gold);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;font-weight:500;transition:background .15s;}
    .admin-btn-confirm:hover{background:var(--gold2);}
    .admin-setup-note{font-size:10px;color:var(--ash);text-align:center;margin-top:12px;line-height:1.5;}
  </style>
  <script src="i18n.js"></script>
</head>
<body>

<!-- ADMIN MODAL -->
<div class="admin-overlay" id="adminModal" style="display:none;">
  <div class="admin-modal">
    <div class="admin-modal-icon">🔐</div>
    <div class="admin-modal-title" id="adminModalTitle">ΕΠΑΛΗΘΕΥΣΗ ADMIN</div>
    <div class="admin-modal-sub" id="adminModalSub">Εισάγετε τον κωδικό admin για να συνεχίσετε.</div>
    <input class="admin-pin-input" id="adminPinInput" type="password" placeholder="••••" maxlength="30" autocomplete="off" />
    <div class="admin-error" id="adminError"></div>
    <div class="admin-modal-btns">
      <button class="admin-btn-cancel" onclick="closeAdminModal()" data-i18n="admin.cancel">Ακύρωση</button>
      <button class="admin-btn-confirm" onclick="confirmAdminPin()" data-i18n="admin.confirm">Επιβεβαίωση</button>
    </div>
    <div class="admin-setup-note" id="adminSetupNote" style="display:none;" data-i18n="admin.setup">Πρώτη ρύθμιση: ο κωδικός που θα πληκτρολογήσετε θα οριστεί ως κωδικός admin.</div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="topbar-back" data-i18n="nav.back">← Portal</a>
    <div class="topbar-brand">Helios &amp; Ella</div>
    <div class="topbar-div"></div>
    <div class="topbar-title">Task Manager</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <button id="themeToggle" class="theme-toggle-btn" onclick="toggleTheme()" data-i18n-title="theme.title">🌙</button>
    <button class="lang-btn theme-toggle-btn" onclick="toggleLang()">EN</button>
  </div>
</div>

<div class="page">

  <!-- SERVICE -->
  <div class="svc-row">
    <button class="svc-btn active" id="btn-dinner" onclick="setService('dinner')" data-i18n="kitchen.btn.dinner">🌙 ΔΕΙΠΝΟ</button>
    <button class="svc-btn" id="btn-lunch" onclick="setService('lunch')" data-i18n="kitchen.btn.lunch">☀️ ΓΕΥΜΑ</button>
    <button class="svc-btn" id="btn-shift" onclick="setService('shift')" data-i18n="kitchen.btn.shift">📋 ΒΑΡΔΙΑ</button>
  </div>

  <!-- DAYS -->
  <div class="day-label" data-i18n="kitchen.day">ΗΜΕΡΑ</div>
  <div class="day-grid" id="dayGrid"></div>
  <div class="day-theme-bar" id="themeBar"></div>

  <!-- STATIONS -->
  <div class="day-label" id="stationLabel" data-i18n="kitchen.station">ΣΤΑΘΜΟΣ</div>
  <div class="station-grid" id="stationGrid"></div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-top">
      <span data-i18n="kitchen.progress">ΠΡΟΟΔΟΣ</span>
      <span id="progressText">0/0 εργασίες</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- SHIFT ASSIGNMENT PANEL -->
  <div id="shiftPanel" style="display:none;">
    <button class="shift-add-toggle" id="shiftAddToggle" onclick="toggleShiftForm()" data-i18n="kitchen.shift.add">+ Νέα Εργασία Βάρδιας</button>
    <div class="shift-form" id="shiftForm" style="display:none;">
      <div class="sf-row">
        <input class="sf-input" id="sf-text" data-i18n-ph="kitchen.sf.text" />
      </div>
      <div class="sf-row sf-row-2">
        <input class="sf-input" id="sf-assignee" data-i18n-ph="kitchen.sf.assignee" />
        <input class="sf-input" id="sf-dur" data-i18n-ph="kitchen.sf.dur" />
      </div>
      <div class="sf-row sf-row-2">
        <select class="sf-select" id="sf-station">
          <option value="all" data-i18n="kitchen.sf.all">👨‍🍳 Όλοι</option>
          <option value="hot">🍳 Hot Kitchen</option>
          <option value="grill">🔥 Grill / Action</option>
          <option value="fish">🐟 Fish Station</option>
          <option value="veg">🥦 Veg / Garnish</option>
          <option value="soup">🍝 Soup &amp; Pasta</option>
        </select>
        <select class="sf-select" id="sf-pri">
          <option value="med">NORMAL</option>
          <option value="high">URGENT</option>
          <option value="low">FLEX</option>
        </select>
      </div>
      <button class="sf-submit" onclick="addShiftTask()" data-i18n="kitchen.sf.submit">✓ Προσθήκη Εργασίας</button>
    </div>
    <div id="shiftTaskList"></div>
  </div>

  <!-- TASKS OUTPUT -->
  <div id="tasksOutput"></div>

  <!-- COMPLETE -->
  <div class="complete-banner" id="completeBanner">
    <div class="complete-icon">✅</div>
    <div class="complete-text" data-i18n="kitchen.complete">MISE EN PLACE COMPLETE</div>
  </div>

  <button class="reset-btn" onclick="resetChecks()" data-i18n="kitchen.reset">↺ Επαναφορά Λίστας</button>
  <button class="pin-btn" id="pinBtn" onclick="openPinManager()">🔑 <span id="pinBtnLabel" data-i18n="kitchen.pin.set">Ορισμός Κωδικού Admin</span></button>

</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const DAYS = [
  { key:"MON", gr:"ΔΕΥ", full:"Δευτέρα",   flag:"🇬🇷", theme:"Greek Buffet" },
  { key:"TUE", gr:"ΤΡΙ", full:"Τρίτη",     flag:"🌮", theme:"South American" },
  { key:"WED", gr:"ΤΕΤ", full:"Τετάρτη",   flag:"🌍", theme:"International" },
  { key:"THU", gr:"ΠΕΜ", full:"Πέμπτη",    flag:"🥢", theme:"Asian Buffet" },
  { key:"FRI", gr:"ΠΑΡ", full:"Παρασκευή", flag:"🔥", theme:"BBQ Buffet" },
  { key:"SAT", gr:"ΣΑΒ", full:"Σάββατο",   flag:"🫏", theme:"Rhodian Buffet" },
  { key:"SUN", gr:"ΚΥΡ", full:"Κυριακή",   flag:"🇮🇹", theme:"Italian Buffet" },
];

const STATIONS = [
  { id:"all",      icon:"👨‍🍳", label:"Όλοι" },
  { id:"hot",      icon:"🍳", label:"Hot Kitchen" },
  { id:"grill",    icon:"🔥", label:"Grill / Action" },
  { id:"fish",     icon:"🐟", label:"Fish Station" },
  { id:"veg",      icon:"🥦", label:"Veg / Garnish" },
  { id:"soup",     icon:"🍝", label:"Soup & Pasta" },
];

// ═══════════════════════════════════════════════════════
// TASK DATA — pri: high=URGENT, med=NORMAL, low=FLEX
// station: hot, grill, fish, veg, soup, all
// ═══════════════════════════════════════════════════════
const TASKS = {
  dinner: {
    MON: [
      { time:"14:00–15:30", title:"Mise en Place", tasks:[
        { text:"Αρνί φούρνου: μαρινάρισμα, χάραξη, τοποθέτηση στα ταψιά με ζωμό", dur:"30'", pri:"high", st:"hot" },
        { text:"Μουσακάς: τηγάνισμα/ψήσιμο μελιτζάνων, βράσιμο κιμά", dur:"40'", pri:"high", st:"hot" },
        { text:"Κιμάς Μουσακά: σοτάρισμα κρεμμυδιών, ντομάτα, κρασί, μπαχαρικά", dur:"25'", pri:"high", st:"hot" },
        { text:"Στιφάδο: ρόδισμα κρέατος σε παρτίδες", dur:"20'", pri:"high", st:"hot" },
        { text:"Μπεσαμέλ Μουσακά: roux + γάλα, αυγά, τυρί", dur:"20'", pri:"med", st:"hot" },
        { text:"Γαρίδες Σαγανάκι: σάλτσα ντομάτας — βάση έτοιμη", dur:"15'", pri:"med", st:"fish" },
        { text:"Ψάρι Σπετσιώτα: ετοιμασία σάλτσας — ντομάτα, κρεμμύδια, μαϊντανός", dur:"20'", pri:"med", st:"fish" },
        { text:"Ρεβίθια: βράσιμο σε σάλτσα ντομάτας", dur:"20'", pri:"med", st:"veg" },
        { text:"Σπανακόπιτα: άνοιγμα φύλλων, ετοιμασία γέμισης", dur:"25'", pri:"med", st:"veg" },
        { text:"Σούπα ψαριού: ζωμός + λαχανικά — βράσιμο", dur:"30'", pri:"high", st:"soup" },
        { text:"Φακές/χόρτα για σαλάτες — βράσιμο και κρύωμα", dur:"20'", pri:"low", st:"soup" },
      ]},
      { time:"15:30–16:45", title:"Μαγείρεμα", tasks:[
        { text:"Αρνί φούρνου: σε φούρνο 180°C σκεπασμένο", dur:"90'", pri:"high", st:"hot" },
        { text:"Στιφάδο: προσθήκη κρεμμυδιών, κρασί, ντομάτα — σιγοβρασμός", dur:"90'", pri:"high", st:"hot" },
        { text:"Μουσακάς: assembly ταψιών + μπεσαμέλ + ψήσιμο 180°C", dur:"60'", pri:"high", st:"hot" },
        { text:"Τηγανητό ψάρι: αλεύρωμα + τηγάνισμα", dur:"20'", pri:"med", st:"fish" },
        { text:"Κολοκυθοκεφτέδες: πλάσιμο + τηγάνισμα", dur:"25'", pri:"med", st:"veg" },

// STATE
// ═══════════════════════════════════════════════════════
let service = "dinner";
let dayKey = "MON";
let station = "all";
let checked = {};

function storageKey() { return `tasks_${service}_${dayKey}_${station}`; }
function loadChecked() {
  try { checked = JSON.parse(localStorage.getItem(storageKey()) || "{}"); } catch { checked = {}; }
}
function saveChecked() {
  try { localStorage.setItem(storageKey(), JSON.stringify(checked)); } catch {}
}

// ═══════════════════════════════════════════════════════
// SHIFT TASK ASSIGNMENT
// ═══════════════════════════════════════════════════════
let shiftTasks = [];

function shiftKey() { return `shift_tasks_${dayKey}`; }
function loadShiftTasks() {
  try { shiftTasks = JSON.parse(localStorage.getItem(shiftKey()) || "[]"); } catch { shiftTasks = []; }
}
function saveShiftTasks() {
  try { localStorage.setItem(shiftKey(), JSON.stringify(shiftTasks)); } catch {}
}

let shiftSessionUnlocked = false; // resets on page refresh

function toggleShiftForm() {
  if (!shiftSessionUnlocked) {
    requireAdmin(() => {
      shiftSessionUnlocked = true;
      openShiftForm();
    });
    return;
  }
  const form = document.getElementById("shiftForm");
  const btn = document.getElementById("shiftAddToggle");
  const isOpen = form.style.display !== "none";
  form.style.display = isOpen ? "none" : "block";
  btn.classList.toggle("open", !isOpen);
  btn.textContent = isOpen ? t("kitchen.shift.add") : "✕ " + (currentLang === "en" ? "Close" : "Κλείσιμο");
}

function openShiftForm() {
  const form = document.getElementById("shiftForm");
  const btn = document.getElementById("shiftAddToggle");
  form.style.display = "block";
  btn.classList.add("open");
  btn.textContent = "✕ " + (currentLang === "en" ? "Close" : "Κλείσιμο");
}

function addShiftTask() {
  const text = document.getElementById("sf-text").value.trim();
  if (!text) { document.getElementById("sf-text").focus(); return; }
  const task = {
    id: Date.now().toString(),
    text,
    assignee: document.getElementById("sf-assignee").value.trim() || t("kitchen.unassigned"),
    dur: document.getElementById("sf-dur").value.trim(),
    station: document.getElementById("sf-station").value,
    pri: document.getElementById("sf-pri").value,
    done: false
  };
  shiftTasks.push(task);
  saveShiftTasks();
  ["sf-text","sf-assignee","sf-dur"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("sf-station").value = "all";
  document.getElementById("sf-pri").value = "med";
  renderShiftPanel();
}

function toggleShiftTask(id) {
  const task = shiftTasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  saveShiftTasks();
  renderShiftPanel();
}

function deleteShiftTask(id) {
  requireAdmin(() => {
    shiftTasks = shiftTasks.filter(t => t.id !== id);
    saveShiftTasks();
    renderShiftPanel();
  });
}

function renderShiftPanel() {
  const total = shiftTasks.length;
  const done = shiftTasks.filter(t => t.done).length;
  document.getElementById("progressText").textContent = `${done}/${total} ${t("kitchen.tasks")}`;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const fill = document.getElementById("progressFill");
  fill.style.width = pct + "%";
  fill.classList.toggle("done", pct === 100);
  document.getElementById("completeBanner").classList.toggle("show", total > 0 && done === total);

  if (!shiftTasks.length) {
    document.getElementById("shiftTaskList").innerHTML = `<div class="shift-empty">${t("kitchen.shift.empty")}</div>`;
    return;
  }

  const stLbl = { all:"Όλοι", hot:"Hot Kitchen", grill:"Grill/Action", fish:"Fish Station", veg:"Veg/Garnish", soup:"Soup & Pasta" };
  const priLbl = { high:"URGENT", med:"NORMAL", low:"FLEX" };

  const groups = {};
  shiftTasks.forEach(t => {
    const k = t.assignee || t("kitchen.unassigned");
    if (!groups[k]) groups[k] = [];
    groups[k].push(t);
  });

  document.getElementById("shiftTaskList").innerHTML = Object.entries(groups).map(([name, tasks]) => `
    <div class="shift-group">
      <div class="shift-group-hdr">
        <div class="shift-group-name ${name === t("kitchen.unassigned") ? "unassigned" : ""}">
          ${name === t("kitchen.unassigned") ? name : "👤 " + name}
        </div>
        <div class="shift-group-count">${tasks.filter(t => t.done).length}/${tasks.length}</div>
      </div>
      ${tasks.map(t => `
        <div class="shift-task ${t.done ? "done" : ""}">
          <div class="shift-task-check" onclick="toggleShiftTask('${t.id}')">${t.done ? "✓" : ""}</div>
          <div class="shift-task-body" onclick="toggleShiftTask('${t.id}')">
            <div class="shift-task-text">${t.text}</div>
            <div class="shift-task-meta">
              <span>${stLbl[t.station] || t.station}</span>
              ${t.dur ? `<span>⏱ ${t.dur}</span>` : ""}
              <span class="task-pri ${t.pri}" style="font-size:8px;padding:1px 5px;border:1px solid;display:inline;">${priLbl[t.pri] || t.pri}</span>
            </div>
          </div>
          <button class="shift-del" onclick="deleteShiftTask('${t.id}')" title="Διαγραφή">×</button>
        </div>
      `).join("")}
    </div>
  `).join("");
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function setService(s) {
  service = s;
  document.querySelectorAll(".svc-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("btn-" + s).classList.add("active");
  if (s === "shift") { loadShiftTasks(); } else { loadChecked(); }
  render();
}

function setDay(key) {
  dayKey = key;
  if (service === "shift") { loadShiftTasks(); } else { loadChecked(); }
  render();
}

function setStation(id) {
  station = id;
  loadChecked();
  render();
}

function buildDayGrid() {
  const grid = document.getElementById("dayGrid");
  grid.innerHTML = DAYS.map(d => `
    <button class="day-btn ${d.key === dayKey ? "active" : ""}" onclick="setDay('${d.key}')">
      <div class="day-flag">${d.flag}</div>
      <div>${d.gr}</div>
    </button>
  `).join("");
  const day = DAYS.find(d => d.key === dayKey);
  document.getElementById("themeBar").innerHTML =
    `${day.flag} <strong>${day.full}</strong> — ${day.theme}`;
}

function buildStationGrid() {
  document.getElementById("stationGrid").innerHTML = STATIONS.map(s => `
    <button class="st-btn ${s.id === station ? "active" : ""}" onclick="setStation('${s.id}')">
      <div class="st-icon">${s.icon}</div>
      <div>${s.label}</div>
    </button>
  `).join("");
}

function getFilteredSections() {
  const all = TASKS[service][dayKey] || [];
  return all.map(section => ({
    ...section,
    tasks: station === "all" ? section.tasks : section.tasks.filter(t => t.st === station || t.st === "all")
  })).filter(s => s.tasks.length > 0);
}

function toggleTask(id) {
  checked[id] = !checked[id];
  saveChecked();
  updateProgress();
  const el = document.getElementById("task-" + id);
  if (el) {
    el.classList.toggle("done", checked[id]);
    el.querySelector(".task-check").textContent = checked[id] ? "✓" : "";
  }
  checkComplete();
}

function updateProgress() {
  const sections = getFilteredSections();
  const total = sections.reduce((a, s) => a + s.tasks.length, 0);
  const done = sections.reduce((a, s) => a + s.tasks.filter((_, i) => checked[`${s.time}-${i}`]).length, 0);
  document.getElementById("progressText").textContent = `${done}/${total} ${t("kitchen.tasks")}`;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const fill = document.getElementById("progressFill");
  fill.style.width = pct + "%";
  fill.classList.toggle("done", pct === 100);
}

function checkComplete() {
  const sections = getFilteredSections();
  const total = sections.reduce((a, s) => a + s.tasks.length, 0);
  const done = sections.reduce((a, s) => a + s.tasks.filter((_, i) => checked[`${s.time}-${i}`]).length, 0);
  document.getElementById("completeBanner").classList.toggle("show", total > 0 && done === total);
}

function renderTasks() {
  const sections = getFilteredSections();
  if (!sections.length) {
    document.getElementById("tasksOutput").innerHTML = `<div class="no-tasks">${t("kitchen.no.tasks")}</div>`;
    return;
  }
  document.getElementById("tasksOutput").innerHTML = sections.map(section => `
    <div class="section-block">
      <div class="section-hdr">
        <div>
          <div class="section-time">${section.time}</div>
          <div class="section-title">${section.title}</div>
        </div>
        <div class="section-count">${section.tasks.filter((_, i) => checked[`${section.time}-${i}`]).length}/${section.tasks.length}</div>
      </div>
      ${section.tasks.map((t, i) => {
        const id = `${section.time}-${i}`;
        const isDone = !!checked[id];
        return `
        <div class="task ${isDone ? "done" : ""}" id="task-${id}" onclick="toggleTask('${id}')">
          <div class="task-check">${isDone ? "✓" : ""}</div>
          <div class="task-body">
            <div class="task-text">${t.text}</div>
            ${t.dur ? `<div class="task-meta">⏱ ${t.dur}</div>` : ""}
          </div>
          <div class="task-pri ${t.pri}">${t.pri === "high" ? "URGENT" : t.pri === "med" ? "NORMAL" : "FLEX"}</div>
        </div>`;
      }).join("")}
    </div>
  `).join("");
}

function render() {
  buildDayGrid();
  const isShift = service === "shift";
  document.getElementById("stationLabel").style.display = isShift ? "none" : "";
  document.getElementById("stationGrid").style.display = isShift ? "none" : "";
  document.getElementById("shiftPanel").style.display = isShift ? "block" : "none";
  document.getElementById("tasksOutput").style.display = isShift ? "none" : "";
  if (isShift) {
    renderShiftPanel();
  } else {
    buildStationGrid();
    renderTasks();
    updateProgress();
    checkComplete();
  }
}

// ═══════════════════════════════════════════════════════
// ADMIN PIN (SHA-256 hashed, stored in localStorage)
// ═══════════════════════════════════════════════════════
const ADMIN_KEY = "helios_admin_hash";
let pendingAdminAction = null;
let adminModalMode = "auth"; // "auth" | "change-verify" | "change-new"

function hashPin(str) {
  // FNV-1a 32-bit hash — synchronous, no secure context needed
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h.toString(16).padStart(8, "0");
}

function requireAdmin(action) {
  adminModalMode = "auth";
  pendingAdminAction = action;
  const hasPin = !!localStorage.getItem(ADMIN_KEY);
  document.getElementById("adminModalTitle").textContent = hasPin ? t("admin.title.auth") : t("admin.title.set");
  document.getElementById("adminModalSub").textContent = hasPin
    ? t("admin.sub.auth")
    : t("admin.sub.set");
  document.getElementById("adminSetupNote").style.display = hasPin ? "none" : "";
  document.getElementById("adminPinInput").value = "";
  document.getElementById("adminError").textContent = "";
  document.getElementById("adminModal").style.display = "flex";
  setTimeout(() => document.getElementById("adminPinInput").focus(), 50);
}

function showModal(title, sub, setupNote) {
  document.getElementById("adminModalTitle").textContent = title;
  document.getElementById("adminModalSub").textContent = sub;
  document.getElementById("adminSetupNote").style.display = setupNote ? "" : "none";
  document.getElementById("adminSetupNote").textContent = setupNote || "";
  document.getElementById("adminPinInput").value = "";
  document.getElementById("adminError").textContent = "";
  document.getElementById("adminModal").style.display = "flex";
  setTimeout(() => document.getElementById("adminPinInput").focus(), 50);
}

function confirmAdminPin() {
  const pin = document.getElementById("adminPinInput").value;
  if (!pin) { document.getElementById("adminPinInput").focus(); return; }
  const hash = hashPin(pin);
  const stored = localStorage.getItem(ADMIN_KEY);

  if (adminModalMode === "auth") {
    if (!stored) {
      localStorage.setItem(ADMIN_KEY, hash);
      updatePinBtn();
      const action = pendingAdminAction;
      closeAdminModal();
      if (action) action();
    } else if (hash === stored) {
      const action = pendingAdminAction;
      closeAdminModal();
      if (action) action();
    } else {
      document.getElementById("adminError").textContent = t("admin.wrong");
      document.getElementById("adminPinInput").value = "";
      document.getElementById("adminPinInput").focus();
    }

  } else if (adminModalMode === "change-verify") {
    if (hash === stored) {
      adminModalMode = "change-new";
      showModal(t("admin.title.new"), t("admin.sub.new"), null);
    } else {
      document.getElementById("adminError").textContent = t("admin.wrong");
      document.getElementById("adminPinInput").value = "";
      document.getElementById("adminPinInput").focus();
    }

  } else if (adminModalMode === "change-new") {
    localStorage.setItem(ADMIN_KEY, hash);
    updatePinBtn();
    closeAdminModal();
    const btn = document.getElementById("pinBtn");
    btn.style.color = "var(--low)";
    btn.querySelector("#pinBtnLabel").textContent = t("kitchen.pin.saved");
    setTimeout(() => { btn.style.color = ""; updatePinBtn(); }, 2000);
  }
}

function closeAdminModal() {
  document.getElementById("adminModal").style.display = "none";
  pendingAdminAction = null;
  adminModalMode = "auth";
}

function openPinManager() {
  const hasPin = !!localStorage.getItem(ADMIN_KEY);
  if (!hasPin) {
    adminModalMode = "auth";
    showModal(t("admin.title.set"), t("admin.sub.set"), t("admin.sub.set2"));
    document.getElementById("adminModal").style.display = "flex";
  } else {
    adminModalMode = "change-verify";
    showModal(t("admin.title.verify"), t("admin.sub.verify"), null);
  }
}

function updatePinBtn() {
  const hasPin = !!localStorage.getItem(ADMIN_KEY);
  document.getElementById("pinBtnLabel").textContent = hasPin ? t("kitchen.pin.change") : t("kitchen.pin.set");
}

function resetChecks() {
  requireAdmin(() => {
    if (service === "shift") {
      shiftTasks = [];
      saveShiftTasks();
      renderShiftPanel();
    } else {
      checked = {};
      saveChecked();
      render();
    }
  });
}

// INIT — detect today's day
const jsDay = new Date().getDay(); // 0=Sun,1=Mon...
const dayMap = { 1:"MON", 2:"TUE", 3:"WED", 4:"THU", 5:"FRI", 6:"SAT", 0:"SUN" };
dayKey = dayMap[jsDay] || "MON";
loadChecked();
render();
updatePinBtn();

document.getElementById("adminPinInput").addEventListener("keydown", e => {
  if (e.key === "Enter") confirmAdminPin();
  if (e.key === "Escape") closeAdminModal();
});

// ── THEME TOGGLE ──
function toggleTheme() {
  const isLight = document.body.classList.toggle("light");
  localStorage.setItem("helios_theme", isLight ? "light" : "dark");
  document.getElementById("themeToggle").textContent = isLight ? "☀️" : "🌙";
}
(function(){
  if (localStorage.getItem("helios_theme") === "light") {
    document.body.classList.add("light");
    const btn = document.getElementById("themeToggle");
    if (btn) btn.textContent = "☀️";
  }
})();
</script>
