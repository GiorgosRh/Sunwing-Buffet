<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Cards · Helios & Ella</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c; --gold-light: #e8cb7a; --gold-dim: #7a6330;
      --bg: #0a0a0a; --surface: #141208; --surface2: #1a1608;
      --border: #2a2518; --text: #f0e8d0; --muted: #6a6050; --red: #e05050;
    }
    body.light {
      --bg: #f5f0e8; --surface: #ede8dc; --surface2: #e5dfd0;
      --border: #c8bfa8; --text: #1a1510; --muted: #6a5e48;
      --gold: #7a5c16; --gold-light: #5a3e08; --gold-dim: #9a7820;
      --red: #c01818;
      background: #f5f0e8 !important;
      color: #1a1510;
    }
    body.light .search-input { color: #1a1510; }
    .theme-toggle-btn{background:none;border:1px solid var(--smoke);color:var(--ash);padding:4px 9px;cursor:pointer;font-size:15px;line-height:1;transition:all .15s;font-family:inherit;}
    .theme-toggle-btn:hover{border-color:var(--gold);color:var(--gold2);}
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; color: var(--text); font-family: 'Montserrat', sans-serif; }
    body { background: var(--bg); }
    a { color: var(--gold-dim); text-decoration: none; font-size: 11px; letter-spacing: 2px; }
    a:hover { color: var(--gold); }

    /* NAV */
    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100;
    }
    .nav-back { font-size: 18px; color: var(--gold-dim); cursor: pointer; }
    .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--gold-light); letter-spacing: 2px; flex: 1; }
    .nav-count { font-size: 10px; color: var(--muted); letter-spacing: 2px; }

    /* HEADER */
    header { padding: 28px 20px 16px; text-align: center; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--gold-light); letter-spacing: 3px; }
    .page-sub { font-size: 9px; letter-spacing: 4px; color: var(--muted); margin-top: 6px; }

    /* FILTER TABS */
    .filter-wrap { overflow-x: auto; padding: 0 20px 16px; scrollbar-width: none; }
    .filter-wrap::-webkit-scrollbar { display: none; }
    .filter-tabs { display: flex; gap: 8px; width: max-content; }
    .tab {
      padding: 7px 14px; border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: 11px; letter-spacing: 1px; cursor: pointer;
      white-space: nowrap; font-family: 'Montserrat', sans-serif; transition: all .15s;
    }
    .tab.active { border-color: var(--gold-dim); background: #1a1608; color: var(--gold); }

    /* SEARCH */
    .search-wrap { padding: 0 20px 20px; }
    .search-input {
      width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 12px;
      outline: none; letter-spacing: 1px;
    }
    .search-input:focus { border-color: var(--gold-dim); }
    .search-input::placeholder { color: var(--muted); }

    /* RECIPE GRID */
    .recipe-grid { padding: 0 20px 40px; display: flex; flex-direction: column; gap: 12px; max-width: 700px; margin: 0 auto; }

    /* RECIPE CARD */
    .recipe-card {
      background: var(--surface); border: 1px solid var(--border); overflow: hidden;
      transition: border-color .2s;
    }
    .recipe-card:hover { border-color: var(--gold-dim); }

    .card-header {
      padding: 16px 18px 14px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px;
    }
    .card-flag { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
    .card-info { flex: 1; min-width: 0; }
    .card-theme { font-size: 8px; letter-spacing: 3px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 3px; }
    .card-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--gold-light); line-height: 1.2; }
    .card-meta { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; }
    .meta-pill {
      font-size: 9px; letter-spacing: 1px; padding: 2px 8px;
      border: 1px solid var(--border); color: var(--muted);
    }
    .meta-pill.time { border-color: #3a2a18; color: #a07040; }
    .meta-pill.portions { border-color: #1a3a18; color: #60a050; }
    .card-toggle { color: var(--gold-dim); font-size: 16px; flex-shrink: 0; transition: transform .2s; }
    .card-toggle.open { transform: rotate(90deg); }

    /* CARD BODY */
    .card-body { display: none; border-top: 1px solid var(--border); }
    .card-body.open { display: block; }

    .body-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .body-tab {
      flex: 1; padding: 10px; text-align: center; font-size: 10px; letter-spacing: 2px;
      color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .15s; font-family: 'Montserrat', sans-serif; background: none; border-right: 1px solid var(--border);
    }
    .body-tab:last-child { border-right: none; }
    .body-tab.active { color: var(--gold); border-bottom-color: var(--gold); background: var(--surface2); }

    .body-panel { display: none; padding: 16px 18px; }
    .body-panel.active { display: block; }

    /* INGREDIENTS */
    .ingredients-list { list-style: none; }
    .ing-item {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 7px 0; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .ing-item:last-child { border-bottom: none; }
    .ing-name { font-size: 12px; color: var(--text); }
    .ing-qty { font-size: 12px; color: var(--gold); font-weight: 600; white-space: nowrap; }
    .ing-note { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* STEPS */
    .steps-list { list-style: none; counter-reset: steps; }
    .step-item { display: flex; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .step-item:last-child { border-bottom: none; }
    .step-num {
      width: 24px; height: 24px; background: var(--gold-dim); color: #000;
      font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .step-text { font-size: 12px; color: var(--text); line-height: 1.6; flex: 1; }
    .step-time { font-size: 10px; color: #a07040; margin-top: 4px; }

    /* TIMING */
    .timing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .timing-item { background: var(--surface2); border: 1px solid var(--border); padding: 12px; }
    .timing-label { font-size: 8px; letter-spacing: 3px; color: var(--muted); margin-bottom: 4px; }
    .timing-value { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--gold-light); }
    .timing-unit { font-size: 10px; color: var(--muted); }
    .timing-note { grid-column: 1/-1; font-size: 11px; color: var(--muted); line-height: 1.6; padding: 10px; background: var(--surface2); border: 1px solid var(--border); }

    /* ALLERGENS */
    .allergen-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .allergen-tag { font-size: 9px; letter-spacing: 1px; padding: 3px 8px; border: 1px solid #5a1a1a; color: #e05050; }

    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

    /* IMPORT / EXPORT */
    .import-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 4px 9px; cursor: pointer; font-size: 13px; line-height: 1;
      transition: all .15s; font-family: inherit;
    }
    .import-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .export-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 15px; padding: 4px 6px; line-height: 1; transition: color .15s;
      flex-shrink: 0;
    }
    .export-btn:hover { color: var(--gold); }
    .imported-badge {
      font-size: 8px; letter-spacing: 2px; color: var(--gold-dim);
      border: 1px solid var(--gold-dim); padding: 1px 5px; margin-left: 6px;
      vertical-align: middle;
    }
    /* DOWNLOAD PIN MODAL */
    .dl-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 200;
      align-items: center; justify-content: center;
    }
    .dl-modal {
      background: var(--surface); border: 1px solid var(--border);
      padding: 28px 24px; width: 280px; text-align: center;
    }
    .dl-modal-icon { font-size: 26px; margin-bottom: 10px; }
    .dl-modal-title { font-size: 11px; letter-spacing: 3px; color: var(--gold); margin-bottom: 6px; }
    .dl-modal-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .dl-pin-input {
      width: 100%; padding: 10px; background: var(--surface2);
      border: 1px solid var(--border); color: var(--text);
      font-size: 18px; text-align: center; letter-spacing: 6px;
      outline: none; font-family: monospace; margin-bottom: 8px;
    }
    .dl-pin-input:focus { border-color: var(--gold-dim); }
    .dl-error { font-size: 11px; color: #e05050; min-height: 16px; margin-bottom: 10px; }
    .dl-btns { display: flex; gap: 8px; }
    .dl-btn-cancel {
      flex: 1; padding: 9px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      font-size: 10px; letter-spacing: 2px; font-family: inherit;
    }
    .dl-btn-confirm {
      flex: 1; padding: 9px; border: none;
      background: var(--gold-dim); color: #000; cursor: pointer;
      font-size: 10px; letter-spacing: 2px; font-family: inherit; font-weight: 600;
    }
    .dl-btn-confirm:hover { background: var(--gold); }
  </style>
  <script src="i18n.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">←</a>
  <div class="nav-title">Recipe Cards</div>
  <div class="nav-count" id="countDisplay">— συνταγές</div>
  <div style="display:flex;align-items:center;gap:8px;">
    <button id="themeToggle" class="theme-toggle-btn" onclick="toggleTheme()" data-i18n-title="theme.title">🌙</button>
    <button class="lang-btn theme-toggle-btn" onclick="toggleLang()">EN</button>
    <button id="clearImportedBtn" class="theme-toggle-btn" onclick="clearImportedRecipes()" title="Διαγραφή imported συνταγών" style="display:none">🗑️</button>
  </div>
</nav>

<header>
  <div class="page-title">RECIPE CARDS</div>
  <div class="page-sub" data-i18n="recipes.subtitle">Buffet · Rhodes 2026</div>
</header>

<div class="filter-wrap">
  <div class="filter-tabs" id="filterTabs">
    <button class="tab active" data-filter="all" data-i18n="recipes.filter.all">🍽️ Όλες</button>
    <button class="tab" data-filter="greek">🇬🇷 Greek</button>
    <button class="tab" data-filter="southamerican">🌮 South American</button>
    <button class="tab" data-filter="international">🌍 International</button>
    <button class="tab" data-filter="asian">🥢 Asian</button>
    <button class="tab" data-filter="bbq">🔥 BBQ</button>
    <button class="tab" data-filter="rhodian">🫏 Rhodian</button>
    <button class="tab" data-filter="italian">🇮🇹 Italian</button>
  </div>
</div>

<div class="search-wrap">
  <input class="search-input" id="searchInput" type="text" data-i18n-ph="recipes.search"/>
</div>

<!-- DOWNLOAD PIN MODAL -->
<div class="dl-overlay" id="dlModal">
  <div class="dl-modal">
    <div class="dl-modal-icon">🔐</div>
    <div class="dl-modal-title">ΕΠΑΛΗΘΕΥΣΗ</div>
    <div class="dl-modal-sub">Εισάγετε τον κωδικό admin για να κατεβάσετε τη συνταγή.</div>
    <input class="dl-pin-input" id="dlPinInput" type="password" maxlength="20" placeholder="••••" onkeydown="if(event.key==='Enter')confirmDlPin()"/>
    <div class="dl-error" id="dlError"></div>
    <div class="dl-btns">
      <button class="dl-btn-cancel" onclick="closeDlModal()">Ακύρωση</button>
      <button class="dl-btn-confirm" onclick="confirmDlPin()">Επιβεβαίωση</button>
    </div>
  </div>
</div>

<div class="recipe-grid" id="recipeGrid"></div>

<script>
const RECIPES = [

  // ═══════════════════════════════════════════

      { text: "Στρώστε τα κομμάτια αρνιού στο GN 1/1 × 100mm σε μια στρώση, με την πέτσα προς τα πάνω. Αν χρησιμοποιείτε πατάτες, τακτοποιήστε τες γύρω από τα κομμάτια. Προσθέστε τα φύλλα δάφνης. Ρίξτε στον πάτο το κρασί και το νερό.", time: "" },

// ─── IMPORTED RECIPES ────────────────────────
const IMPORT_KEY = "helios_imported_recipes";
let importedRecipes = [];
try { importedRecipes = JSON.parse(localStorage.getItem(IMPORT_KEY) || "[]"); } catch(e) {}

function allRecipes() { return [...RECIPES, ...importedRecipes]; }

// ─── APP LOGIC ───────────────────────────────
let activeFilter = "all";
let searchTerm = "";
let openCards = new Set();

function getFiltered() {
  return allRecipes().filter(r => {
    const matchFilter = activeFilter === "all" || r.theme === activeFilter;
    const q = searchTerm.toLowerCase();
    const matchSearch = !q || r.name.toLowerCase().includes(q) || (r.themeLabel||"").toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
}

  grid.innerHTML = filtered.map(r => `
    <div class="recipe-card" id="card-${r.id}">
      <div class="card-header" onclick="toggleCard(${r.id})">
        <div class="card-flag">${r.flag}</div>
        <div class="card-info">
          <div class="card-theme">${r.themeLabel}</div>
          <div class="card-name">${r.name}${r._imported ? `<span class="imported-badge">${t("recipes.imported")}</span>` : ''}</div>

function toggleCard(id) {
  if (openCards.has(id)) {
    openCards.delete(id);
  } else {
    openCards.add(id);
  }
  renderAll();
}

function switchTab(id, tab, btn) {
  const panels = ['ing','steps','timing'];
  panels.forEach(p => {
    const el = document.getElementById(`${p}-${id}`);
    if (el) el.classList.toggle('active', p === tab);
  });
  btn.parentElement.querySelectorAll('.body-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

document.getElementById("filterTabs").addEventListener("click", e => {
  if (e.target.classList.contains("tab")) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    e.target.classList.add("active");
    activeFilter = e.target.dataset.filter;
    renderAll();
  }
});

document.getElementById("searchInput").addEventListener("input", e => {
  searchTerm = e.target.value;
  renderAll();
});

renderAll();
updateClearBtn();

// ── DOWNLOAD PIN ──
const ADMIN_KEY = "helios_admin_hash";
let downloadUnlocked = false; // resets on page refresh
let pendingDownloadId = null;

function hashPin(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h.toString(16).padStart(8, "0");
}

function openDlModal(id) {
  pendingDownloadId = id;
  document.getElementById("dlPinInput").value = "";
  document.getElementById("dlError").textContent = "";
  document.getElementById("dlModal").style.display = "flex";
  setTimeout(() => document.getElementById("dlPinInput").focus(), 50);
}

function closeDlModal() {
  document.getElementById("dlModal").style.display = "none";
  pendingDownloadId = null;
}

function confirmDlPin() {
  const pin = document.getElementById("dlPinInput").value;
  const stored = localStorage.getItem(ADMIN_KEY);
  if (!stored) {
    // No PIN set — unlock freely
    downloadUnlocked = true;
    closeDlModal();
    doExport(pendingDownloadId);
    return;
  }
  if (hashPin(pin) === stored) {
    downloadUnlocked = true;
    const id = pendingDownloadId;
    closeDlModal();
    doExport(id);
  } else {
    document.getElementById("dlError").textContent = "✕ Λάθος κωδικός.";
    document.getElementById("dlPinInput").value = "";
    document.getElementById("dlPinInput").focus();
  }
}

// ── EXPORT ──
function exportRecipe(id, event) {
  event.stopPropagation();
  if (!downloadUnlocked) { openDlModal(id); return; }
  doExport(id);
}

function doExport(id) {
  const r = allRecipes().find(x => x.id === id);
  if (!r) return;
  const data = JSON.stringify(r, null, 2);
  const safeName = r.name.replace(/[^\w\u0370-\u03FF\u1F00-\u1FFF ]/g, '_').trim();
  const html = `<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>${r.name} · Recipe Card</title>
<style>
  body{font-family:Georgia,serif;max-width:680px;margin:40px auto;padding:20px;color:#1a1510;background:#faf8f4;}
  h1{font-size:28px;margin-bottom:4px;}
  .meta{font-size:12px;color:#6a5e48;margin-bottom:24px;}
  h2{font-size:14px;letter-spacing:2px;color:#7a5c16;border-bottom:1px solid #c8bfa8;padding-bottom:4px;margin-top:24px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  td{padding:6px 4px;border-bottom:1px solid #e5dfd0;}
  td:last-child{text-align:right;font-weight:bold;color:#7a5c16;}
  ol{padding-left:20px;} li{margin-bottom:10px;font-size:13px;line-height:1.6;}
  .allergen{display:inline-block;border:1px solid #c01818;color:#c01818;font-size:11px;padding:2px 7px;margin:2px;}
  .info{display:flex;gap:20px;font-size:12px;}
  .info span{background:#ede8dc;padding:4px 10px;border-radius:2px;}
</style>
</head>
<body>
<div style="font-size:11px;color:#9a7820;letter-spacing:2px;margin-bottom:6px;">${r.flag} ${r.themeLabel||''}</div>
<h1>${r.name}</h1>
<div class="info">
  <span>⏱ Prep: ${r.prepTime} λεπτά</span>
  <span>🔥 Cook: ${r.cookTime} λεπτά</span>
  <span>👥 ${r.portions} μερίδες</span>
</div>
<h2>ΥΛΙΚΑ</h2>
<table>${r.ingredients.map(i=>`<tr><td>${i.name}${i.note?'<br><small style="color:#9a8870">'+i.note+'</small>':''}</td><td>${i.qty}</td></tr>`).join('')}</table>
<h2>ΕΚΤΕΛΕΣΗ</h2>
<ol>${r.steps.map(s=>`<li>${s.text}${s.time?'<br><small style="color:#9a7820">'+s.time+'</small>':''}</li>`).join('')}</ol>
${r.notes?`<h2>ΣΗΜΕΙΩΣΕΙΣ</h2><p style="font-size:13px;line-height:1.6">${r.notes}</p>`:''}
${r.allergens&&r.allergens.length?`<h2>ΑΛΛΕΡΓΙΟΓΟΝΑ</h2>${r.allergens.map(a=>`<span class="allergen">${a}</span>`).join('')}`:''}
<div id="recipe-data" style="display:none">${encodeURIComponent(data)}</div>
</body></html>`;
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = safeName + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── IMPORT ──
function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      let recipe = null;
      const text = ev.target.result;
      // Extract embedded data from exported HTML
      const match = text.match(/<div id="recipe-data"[^>]*>([^<]+)<\/div>/);
      if (match) {
        recipe = JSON.parse(decodeURIComponent(match[1]));
      } else {
        recipe = JSON.parse(text); // plain JSON fallback
      }
      if (!recipe || !recipe.name || !recipe.ingredients || !recipe.steps) {
        alert('Μη έγκυρο αρχείο συνταγής.');
        return;
      }
      // Assign new unique ID
      const maxId = Math.max(0, ...allRecipes().map(r => r.id));
      recipe.id = maxId + 1;
      recipe._imported = true;
      importedRecipes.push(recipe);
      localStorage.setItem(IMPORT_KEY, JSON.stringify(importedRecipes));
      renderAll();
      alert('✓ Η συνταγή "' + recipe.name + '" προστέθηκε!');
    } catch(err) {
      alert('Σφάλμα ανάγνωσης αρχείου.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── CLEAR IMPORTED ──
function clearImportedRecipes() {
  if (!importedRecipes.length) { alert('Δεν υπάρχουν imported συνταγές.'); return; }
  if (!confirm('Να διαγραφούν όλες οι imported συνταγές (' + importedRecipes.length + ');')) return;
  importedRecipes = [];
  localStorage.removeItem(IMPORT_KEY);
  updateClearBtn();
  renderAll();
}
function updateClearBtn() {
  const btn = document.getElementById('clearImportedBtn');
  if (btn) btn.style.display = importedRecipes.length ? 'inline-flex' : 'none';
}

function toggleTheme() {
  const isLight = document.body.classList.toggle("light");
  localStorage.setItem("helios_theme", isLight ? "light" : "dark");
  document.getElementById("themeToggle").textContent = isLight ? "☀️" : "🌙";
}
(function(){
  if (localStorage.getItem("helios_theme") === "light") {
    document.body.classList.add("light");
    const btn = document.getElementById("themeToggle");
    if (btn) btn.textContent = "☀️";
  }
})();
