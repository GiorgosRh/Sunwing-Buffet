<!DOCTYPE html>
<html lang="el">
<head>

  <meta name="theme-color" content="#0a0a0a"/>

  <style>
    :root {
      --gold: #c9a84c; --gold-light: #e8cb7a; --gold-dim: #7a6330;
      --bg: #0a0a0a; --surface: #141208; --surface2: #1a1608;
      --border: #2a2518; --text: #f0e8d0; --muted: #6a6050; --red: #e05050;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; }
    a { color: var(--gold-dim); text-decoration: none; font-size: 11px; letter-spacing: 2px; }
    a:hover { color: var(--gold); }

    /* NAV */
    nav {
      background: #0f0d06; border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100;
    }
    .nav-back { font-size: 18px; color: var(--gold-dim); cursor: pointer; }
    .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--gold-light); letter-spacing: 2px; flex: 1; }
    .nav-count { font-size: 10px; color: var(--muted); letter-spacing: 2px; }

    /* HEADER */
    header { padding: 28px 20px 16px; text-align: center; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--gold-light); letter-spacing: 3px; }
    .page-sub { font-size: 9px; letter-spacing: 4px; color: var(--muted); margin-top: 6px; }

    /* FILTER TABS */
    .filter-wrap { overflow-x: auto; padding: 0 20px 16px; scrollbar-width: none; }
    .filter-wrap::-webkit-scrollbar { display: none; }
    .filter-tabs { display: flex; gap: 8px; width: max-content; }
    .tab {
      padding: 7px 14px; border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: 11px; letter-spacing: 1px; cursor: pointer;
      white-space: nowrap; font-family: 'Montserrat', sans-serif; transition: all .15s;
    }
    .tab.active { border-color: var(--gold-dim); background: #1a1608; color: var(--gold); }

    /* SEARCH */
    .search-wrap { padding: 0 20px 20px; }
    .search-input {
      width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 12px;
      outline: none; letter-spacing: 1px;
    }
    .search-input:focus { border-color: var(--gold-dim); }
    .search-input::placeholder { color: var(--muted); }

    /* RECIPE GRID */
    .recipe-grid { padding: 0 20px 40px; display: flex; flex-direction: column; gap: 12px; max-width: 700px; margin: 0 auto; }

    /* RECIPE CARD */
    .recipe-card {
      background: var(--surface); border: 1px solid var(--border); overflow: hidden;
      transition: border-color .2s;
    }
    .recipe-card:hover { border-color: var(--gold-dim); }

    .card-header {
      padding: 16px 18px 14px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px;
    }
    .card-flag { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
    .card-info { flex: 1; min-width: 0; }
    .card-theme { font-size: 8px; letter-spacing: 3px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 3px; }
    .card-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--gold-light); line-height: 1.2; }
    .card-meta { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; }
    .meta-pill {
      font-size: 9px; letter-spacing: 1px; padding: 2px 8px;
      border: 1px solid var(--border); color: var(--muted);
    }
    .meta-pill.time { border-color: #3a2a18; color: #a07040; }
    .meta-pill.portions { border-color: #1a3a18; color: #60a050; }
    .card-toggle { color: var(--gold-dim); font-size: 16px; flex-shrink: 0; transition: transform .2s; }
    .card-toggle.open { transform: rotate(90deg); }

    /* CARD BODY */
    .card-body { display: none; border-top: 1px solid var(--border); }
    .card-body.open { display: block; }

    .body-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .body-tab {
      flex: 1; padding: 10px; text-align: center; font-size: 10px; letter-spacing: 2px;
      color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .15s; font-family: 'Montserrat', sans-serif; background: none; border-right: 1px solid var(--border);
    }
    .body-tab:last-child { border-right: none; }
    .body-tab.active { color: var(--gold); border-bottom-color: var(--gold); background: #1a1608; }

    .body-panel { display: none; padding: 16px 18px; }
    .body-panel.active { display: block; }

    /* INGREDIENTS */
    .ingredients-list { list-style: none; }
    .ing-item {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 7px 0; border-bottom: 1px solid #1a1608; gap: 12px;
    }
    .ing-item:last-child { border-bottom: none; }
    .ing-name { font-size: 12px; color: var(--text); }
    .ing-qty { font-size: 12px; color: var(--gold); font-weight: 600; white-space: nowrap; }
    .ing-note { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* STEPS */
    .steps-list { list-style: none; counter-reset: steps; }
    .step-item { display: flex; gap: 14px; padding: 10px 0; border-bottom: 1px solid #1a1608; }
    .step-item:last-child { border-bottom: none; }
    .step-num {
      width: 24px; height: 24px; background: var(--gold-dim); color: #000;
      font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .step-text { font-size: 12px; color: var(--text); line-height: 1.6; flex: 1; }
    .step-time { font-size: 10px; color: #a07040; margin-top: 4px; }

    /* TIMING */
    .timing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .timing-item { background: #0f0d06; border: 1px solid var(--border); padding: 12px; }
    .timing-label { font-size: 8px; letter-spacing: 3px; color: var(--muted); margin-bottom: 4px; }
    .timing-value { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--gold-light); }
    .timing-unit { font-size: 10px; color: var(--muted); }
    .timing-note { grid-column: 1/-1; font-size: 11px; color: var(--muted); line-height: 1.6; padding: 10px; background: #0f0d06; border: 1px solid var(--border); }

    /* ALLERGENS */
    .allergen-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .allergen-tag { font-size: 9px; letter-spacing: 1px; padding: 3px 8px; border: 1px solid #5a1a1a; color: #e05050; }

    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  </style>
</head>

// ─── APP LOGIC ───────────────────────────────
let activeFilter = "all";
let searchTerm = "";
let openCards = new Set();

function getFiltered() {
  return RECIPES.filter(r => {
    const matchFilter = activeFilter === "all" || r.theme === activeFilter;
    const q = searchTerm.toLowerCase();
    const matchSearch = !q || r.name.toLowerCase().includes(q) || r.themeLabel.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
}

function renderAll() {
  const grid = document.getElementById("recipeGrid");
  const filtered = getFiltered();
  document.getElementById("countDisplay").textContent = filtered.length + " συνταγές";

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Δεν βρέθηκαν συνταγές</div>';
    return;
  }

  grid.innerHTML = filtered.map(r => `
    <div class="recipe-card" id="card-${r.id}">
      <div class="card-header" onclick="toggleCard(${r.id})">
        <div class="card-flag">${r.flag}</div>
        <div class="card-info">
          <div class="card-theme">${r.themeLabel}</div>
          <div class="card-name">${r.name}</div>
          <div class="card-meta">
            <span class="meta-pill time">⏱ Σύνολο: ${r.totalTime} λεπτά</span>
            <span class="meta-pill time">🔪 Prep: ${r.prepTime} λεπτά</span>
            <span class="meta-pill portions">👥 ${r.portions} άτομα</span>
          </div>
        </div>
        <div class="card-toggle ${openCards.has(r.id) ? 'open' : ''}" id="toggle-${r.id}">›</div>
      </div>
      <div class="card-body ${openCards.has(r.id) ? 'open' : ''}" id="body-${r.id}">
        <div class="body-tabs">
          <button class="body-tab active" onclick="switchTab(${r.id}, 'ing', this)">Υλικά</button>
          <button class="body-tab" onclick="switchTab(${r.id}, 'steps', this)">Βήματα</button>
          <button class="body-tab" onclick="switchTab(${r.id}, 'timing', this)">Χρόνοι</button>
        </div>
        <div class="body-panel active" id="ing-${r.id}">
          <ul class="ingredients-list">
            ${r.ingredients.map(i => `
              <li class="ing-item">
                <div>
                  <div class="ing-name">${i.name}</div>
                  ${i.note ? `<div class="ing-note">${i.note}</div>` : ''}
                </div>
                <div class="ing-qty">${i.qty}</div>
              </li>
            `).join('')}
          </ul>
        </div>
        <div class="body-panel" id="steps-${r.id}">
          <ul class="steps-list">
            ${r.steps.map((s, i) => `
              <li class="step-item">
                <div class="step-num">${i+1}</div>
                <div>
                  <div class="step-text">${s.text}</div>
                  ${s.time ? `<div class="step-time">${s.time}</div>` : ''}
                </div>
              </li>
            `).join('')}
          </ul>
        </div>
        <div class="body-panel" id="timing-${r.id}">
          <div class="timing-grid">
            <div class="timing-item">
              <div class="timing-label">ΠΡΟΕΤΟΙΜΑΣΙΑ</div>
              <div class="timing-value">${r.prepTime}<span class="timing-unit"> λεπτά</span></div>
            </div>
            <div class="timing-item">
              <div class="timing-label">ΜΑΓΕΙΡΕΜΑ</div>
              <div class="timing-value">${r.cookTime}<span class="timing-unit"> λεπτά</span></div>
            </div>
            <div class="timing-item">
              <div class="timing-label">ΣΥΝΟΛΟ</div>
              <div class="timing-value">${r.totalTime}<span class="timing-unit"> λεπτά</span></div>
            </div>
            <div class="timing-item">
              <div class="timing-label">ΜΕΡΙΔΕΣ</div>
              <div class="timing-value">${r.portions}<span class="timing-unit"> άτομα</span></div>
            </div>
            <div class="timing-note">📌 ${r.notes}</div>
            ${r.allergens.length ? `
              <div class="timing-note" style="border-color:#5a1a1a">
                ⚠️ <strong style="color:#e05050">Αλλεργιογόνα:</strong><br/>
                <div class="allergen-row" style="margin-top:6px">
                  ${r.allergens.map(a => `<span class="allergen-tag">${a}</span>`).join('')}
                </div>
              </div>
            ` : ''}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleCard(id) {
  if (openCards.has(id)) {
    openCards.delete(id);
  } else {
    openCards.add(id);
  }
  renderAll();
}

function switchTab(id, tab, btn) {
  const panels = ['ing','steps','timing'];
  panels.forEach(p => {
    const el = document.getElementById(`${p}-${id}`);
    if (el) el.classList.toggle('active', p === tab);
  });
  btn.parentElement.querySelectorAll('.body-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

document.getElementById("filterTabs").addEventListener("click", e => {
  if (e.target.classList.contains("tab")) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    e.target.classList.add("active");
    activeFilter = e.target.dataset.filter;
    renderAll();
  }
});

document.getElementById("searchInput").addEventListener("input", e => {
  searchTerm = e.target.value;
  renderAll();
});

renderAll();
</script>
