<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kitchen Techniques · Helios & Ella</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#060604"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink:#060604; --ink2:#0e0d09; --ink3:#161410;
      --gold:#b8962e; --gold2:#d4af55; --gold3:#f0d080;
      --smoke:#2a2520; --ash:#4a4438; --fog:#8a7e6e;
      --paper:#f5f0e8; --paper2:#ede5d5;
      --green:#3a7a5a; --blue:#2a5a8a; --red:#7a2a2a; --purple:#5a2a7a;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--ink);color:var(--paper);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
    a{color:var(--gold2);text-decoration:none;}

    /* TOPBAR */
    .topbar{position:sticky;top:0;z-index:100;background:rgba(6,6,4,.95);backdrop-filter:blur(20px);border-bottom:1px solid #ffffff08;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;}
    .topbar-left{display:flex;align-items:center;gap:16px;}
    .topbar-brand{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold2);}
    .topbar-div{width:1px;height:18px;background:var(--smoke);}
    .topbar-title{font-size:10px;letter-spacing:3px;color:var(--ash);text-transform:uppercase;}
    .topbar-back{font-size:11px;color:var(--ash);letter-spacing:2px;cursor:pointer;transition:color .2s;}
    .topbar-back:hover{color:var(--gold2);}

    /* HERO */
    .hero{padding:48px 24px 32px;max-width:860px;margin:0 auto;}
    .hero-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .ey-line{width:28px;height:1px;background:linear-gradient(to right,var(--gold),transparent);}
    .ey-text{font-size:9px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;}
    .hero-title{font-family:'Playfair Display',serif;font-size:clamp(32px,7vw,56px);font-weight:400;line-height:1.1;color:var(--paper);}
    .hero-title em{font-style:italic;color:var(--gold2);}
    .hero-sub{font-size:12px;color:var(--fog);margin-top:12px;line-height:1.7;max-width:500px;}

    /* CATEGORY TABS */
    .tabs-wrap{overflow-x:auto;padding:0 24px 20px;scrollbar-width:none;}
    .tabs-wrap::-webkit-scrollbar{display:none;}
    .tabs{display:flex;gap:6px;width:max-content;}
    .tab{padding:8px 16px;border:1px solid var(--smoke);background:var(--ink2);color:var(--ash);font-size:10px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
    .tab.active,.tab:hover{border-color:var(--gold);color:var(--gold);background:#1a1608;}

    /* SEARCH */
    .search-wrap{padding:0 24px 24px;}
    .search{width:100%;max-width:860px;padding:10px 16px;background:var(--ink2);border:1px solid var(--smoke);color:var(--paper);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;letter-spacing:1px;}
    .search:focus{border-color:var(--ash);}
    .search::placeholder{color:var(--ash);}

    /* GRID */
    .grid{padding:0 24px 60px;max-width:860px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:10px;}

    /* CARD */
    .card{background:var(--ink2);border:1px solid var(--smoke);overflow:hidden;transition:border-color .2s;}
    .card:hover{border-color:var(--ash);}
    .card-head{padding:18px 20px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:14px;}
    .card-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px;}
    .card-info{flex:1;}
    .card-cat{font-size:8px;letter-spacing:3px;color:var(--ash);text-transform:uppercase;margin-bottom:4px;}
    .card-name{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold2);line-height:1.2;}
    .card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .tag{font-size:8px;letter-spacing:1px;padding:2px 8px;border:1px solid var(--smoke);color:var(--fog);}
    .card-chevron{font-size:16px;color:var(--ash);transition:transform .2s;flex-shrink:0;margin-top:2px;}
    .card-chevron.open{transform:rotate(90deg);}

    /* CARD BODY */
    .card-body{display:none;border-top:1px solid var(--smoke);}
    .card-body.open{display:block;}
    .btabs{display:flex;border-bottom:1px solid var(--smoke);}
    .btab{flex:1;padding:10px 8px;text-align:center;font-size:9px;letter-spacing:2px;color:var(--ash);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif;background:none;text-transform:uppercase;}
    .btab:not(:last-child){border-right:1px solid var(--smoke);}
    .btab.active{color:var(--gold);border-bottom-color:var(--gold);background:#1a1608;}
    .bpanel{display:none;padding:18px 20px;}
    .bpanel.active{display:block;}

    /* TECHNIQUE STEPS */
    .steps{list-style:none;}
    .step{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--ink3);}
    .step:last-child{border-bottom:none;}
    .step-n{width:22px;height:22px;background:var(--gold);color:#000;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
    .step-body{flex:1;}
    .step-text{font-size:12px;color:var(--paper);line-height:1.65;}
    .step-note{font-size:10px;color:var(--fog);margin-top:4px;font-style:italic;}

    /* KEY POINTS */
    .keypoints{list-style:none;}
    .kp{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--ink3);}
    .kp:last-child{border-bottom:none;}
    .kp-bullet{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;margin-top:6px;}
    .kp-text{font-size:12px;color:var(--paper);line-height:1.6;}

    /* APPLICATIONS */
    .apps-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    @media(max-width:480px){.apps-grid{grid-template-columns:1fr;}}
    .app-item{background:var(--ink3);border:1px solid var(--smoke);padding:12px 14px;}
    .app-dish{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold2);margin-bottom:4px;}
    .app-detail{font-size:10px;color:var(--fog);line-height:1.5;}
    .app-temp{font-size:9px;color:var(--gold);margin-top:4px;letter-spacing:1px;}

    /* SECTION DIVIDER */
    .divider{padding:8px 24px 16px;max-width:860px;margin:0 auto;display:flex;align-items:center;gap:14px;}
    .div-label{font-size:9px;letter-spacing:4px;color:var(--ash);text-transform:uppercase;white-space:nowrap;}
    .div-line{flex:1;height:1px;background:linear-gradient(to right,var(--smoke),transparent);}

    .empty{text-align:center;padding:48px 20px;color:var(--ash);font-size:13px;}
    .count{font-size:10px;color:var(--ash);letter-spacing:2px;}
  </style>
</head>

  <h1 class="hero-title">Culinary<br/><em>Techniques</em></h1>

</div>

<script>
const DATA = [

// ═══════════════════════════ MISE EN PLACE ═══════════════════════════
{

// ─── APP LOGIC ───────────────────────────────────────────────
let activeCat = "all";
let searchTerm = "";
let openCards = {};
let activeTabs = {};

function getFiltered() {
  return DATA.filter(r => {
    const matchCat = activeCat === "all" || r.cat === activeCat;
    const q = searchTerm.toLowerCase();
    const matchSearch = !q || r.name.toLowerCase().includes(q) || r.tags.some(t => t.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });
}

function renderAll() {
  const grid = document.getElementById("grid");
  const filtered = getFiltered();

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Δεν βρέθηκαν τεχνικές</div>';
    return;
  }

  grid.innerHTML = filtered.map(r => {
    const isOpen = openCards[r.id];
    const activeTab = activeTabs[r.id] || "steps";

    return `
    <div class="card" id="card-${r.id}">
      <div class="card-head" onclick="toggleCard(${r.id})">
        <div class="card-cat-dot" style="background:${r.dotColor}"></div>
        <div class="card-info">
          <div class="card-cat">${r.catLabel}</div>
          <div class="card-name">${r.name}</div>
          <div class="card-tags">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
        <div class="card-chevron ${isOpen ? 'open' : ''}">›</div>
      </div>
      <div class="card-body ${isOpen ? 'open' : ''}">
        <div class="btabs">
          <button class="btab ${activeTab==='steps'?'active':''}" onclick="switchTab(${r.id},'steps',this)">Τεχνική</button>
          <button class="btab ${activeTab==='key'?'active':''}" onclick="switchTab(${r.id},'key',this)">Key Points</button>
          <button class="btab ${activeTab==='apps'?'active':''}" onclick="switchTab(${r.id},'apps',this)">Εφαρμογές</button>
        </div>
        <div class="bpanel ${activeTab==='steps'?'active':''}" id="steps-${r.id}">
          <ul class="steps">
            ${r.steps.map((s,i) => `
              <li class="step">
                <div class="step-n">${i+1}</div>
                <div class="step-body">
                  <div class="step-text"><strong>${s.t}</strong> — ${s.d}</div>
                  ${s.note ? `<div class="step-note">${s.note}</div>` : ''}
                </div>
              </li>
            `).join('')}
          </ul>
        </div>
        <div class="bpanel ${activeTab==='key'?'active':''}" id="key-${r.id}">
          <ul class="keypoints">
            ${r.keypoints.map(k => `
              <li class="kp">
                <div class="kp-bullet"></div>
                <div class="kp-text">${k.t}</div>
              </li>
            `).join('')}
          </ul>
        </div>
        <div class="bpanel ${activeTab==='apps'?'active':''}" id="apps-${r.id}">
          <div class="apps-grid">
            ${r.apps.map(a => `
              <div class="app-item">
                <div class="app-dish">${a.d}</div>
                <div class="app-detail">${a.det}</div>
                ${a.tmp ? `<div class="app-temp">⏱ ${a.tmp}</div>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  openCards[id] = !openCards[id];
  renderAll();
}

function switchTab(id, tab, btn) {
  activeTabs[id] = tab;
  ['steps','key','apps'].forEach(t => {
    const el = document.getElementById(`${t}-${id}`);
    if (el) el.classList.toggle('active', t === tab);
  });
  btn.parentElement.querySelectorAll('.btab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

document.getElementById("tabs").addEventListener("click", e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  renderAll();
});

document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value;
  renderAll();
});

renderAll();
</script>
